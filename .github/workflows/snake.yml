name: Generate Contribution Animations

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: timomak
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#1E90FF&color_dots=#c6e48b,#7bc96f,#239a3b,#196127
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00D9FF

      - uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: timomak

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
